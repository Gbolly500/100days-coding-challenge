<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day1</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eef0c4;
    font-family: 'Poppins', Arial, sans-serif;
  }

  .card {
    position: relative;
    width: 320px;
    background: #ffffff;
    border-radius: 28px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    padding-bottom: 32px;
  }


  .card-header {
    position: relative;
    height: 210px;
    background: #a12764;
  }

  .card-header svg {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 60px;
    display: block;
  }

  .avatar {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #ffffff;
    padding: 4px;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  .card-body {
    text-align: center;
    padding: 0 28px;
  }

  .name {
    margin: 18px 0 2px;
    font-size: 24px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }

  .handle {
    margin: 0;
    font-size: 13px;
    color: #9b9b9b;
  }

  .social-icons {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 20px 0 22px;
  }

  .social-icons a {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-decoration: none;
  }

  .social-icons svg {
    width: 16px;
    height: 16px;
    fill: #ffffff;
  }

  .bio {
    margin: 0 0 26px;
    font-size: 13.5px;
    line-height: 1.6;
    color: #4a4a4a;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 30px;
    padding: 12px 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-follow {
    background: #e91e8c;
    color: #ffffff;
  }

  .btn-message {
    background: #ffffff;
    color: #b9b9b9;
    border: 1.5px solid #e2e2e2;
  }
</style>
</head>
