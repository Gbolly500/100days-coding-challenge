<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day1</title>
</head>
<style>
    body{
        background-color: cornsilk;
        margin: 0;
        padding: 0;
    }
    .general{
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 150px;
        width: 350px;
        background: white;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,.15);
        text-align: center;
    }
    .box{
    
    }
    .but{
        display: flex;
        justify-content: center;
        gap: 50px;
        padding: 20px;
        
    }
    .but1, .but2{
        width: 100px;
        height: 30px;
        border-radius: 20px;
        border: none;
        
    }
    .but1{
        background-color: rgb(230, 102, 123);
        color: white;
    }
    .but2{
        border: double;
        background-color: white;
        color: gray;
    }
    .profile{
        position:absolute;
        bottom:-45px;
        left:50%;
        transform:translateX(-50%);
    }
    .profile img{
        width:90px;
        height:90px;
        border-radius:50%;
        border:6px solid white;
        object-fit:cover;
    }
    .wave{
    position:absolute;
    bottom:-20px;
    left:0;
    width:100%;
    height:60px;
    background:#ff2f92;
    border-radius:50%;
    }
    .first{
    height:180px;
    background:#983055;
    position:relative;
    }
</style>
<body>
    <div class="general">
        <div class="box">
            <div class="first">
                <div class="wave"></div>
                <div class="profile"><img src="image/Food_image-removebg-preview.png" alt=""></div>
                
            </div>
            <div class="second">
                <h4>Babatunde Sakirudeen</h4>
                <p>@gbolly_marley</p>
                <div></div>
                <p>Crafting brand and communication strategies,creating visual designs, leading art direction, and capturing portraits through photography.</p>
                <div class="but">
                    <button class="but1">Follow</button>
                    <button class="but2">Message</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
